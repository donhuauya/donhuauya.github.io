        // MENÚ ACCION:
        

        function changeImage() {
            const img_buttom_menu = document.getElementById("img_menu_icon");
            const box_content_menu = document.getElementById("fixed_content_nav");
            if (img_buttom_menu.src.match("exit")) {
                img_buttom_menu.src = "_img/menu.png";
                box_content_menu.style.display = "none";
                body.style.overflow(y) = "scroll"

            } else {
                img_buttom_menu.src = "_img/exit.png";
                box_content_menu.style.display = "block"
                body.style.overflow = "hidden"
            }
        }

        const box_button_menu = document.getElementById("menu_button");
        box_button_menu.addEventListener("click", changeImage)
        

        
    </script>
